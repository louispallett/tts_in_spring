spring.application.name=tts_in_spring
server.port=8080
spring.web.resources.add-mappings=false
spring.datasource.url=${DB_URL_LOCAL}
spring.datasource.username=${DB_USERNAME_LOCAL}
spring.datasource.password=${DB_PASSWORD_LOCAL}
spring.datasource.driver-class-name=org.postgresql.Driver
jwt.secret=${JWT_SECRET}
jwt.expiration=36000000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
cookie.secure=false
resend.key=${RESEND_KEY}
resend.from=${RESEND_FROM}
resend.replyTo=${RESEND_REPLY_TO}
app.frontendUrl=${FRONTEND_URL}
